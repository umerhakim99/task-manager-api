<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .brand span { color: #e94560; }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #dee2e6;
            padding: 0.7rem 1rem;
        }
        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.15);
        }
        .btn-submit {
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 0.7rem;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #c73652; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">My<span>App</span></div>
    <p class="text-center text-muted small mb-4">Enter your email to reset your password</p>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label fw-500">
                <i class="bi bi-envelope me-1"></i>Email Address
            </label>
            <input type="email" name="email" class="form-control"
                   placeholder="Enter your registered email" required>
        </div>
        <button type="submit" class="btn-submit">
            <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="/accounts/login/" style="color:#6c757d; font-size:0.9rem; text-decoration:none;">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
