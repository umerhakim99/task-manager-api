<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Django App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .brand span { color: #e94560; }
        .subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #dee2e6;
            padding: 0.7rem 1rem;
        }
        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.15);
        }
        .btn-login {
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 0.7rem;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #c73652; }
        .form-label { font-weight: 500; color: #1a1a2e; font-size: 0.9rem; }
        .divider {
            text-align: center;
            color: #6c757d;
            font-size: 0.85rem;
            margin: 1.5rem 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #dee2e6;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .error-msg {
            background: #fff5f5;
            border: 1px solid #ffc9c9;
            border-radius: 8px;
            color: #c92a2a;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">My<span>App</span></div>
    <p class="subtitle">Sign in to your account</p>
    {% if form.errors %}
        <div class="error-msg">
            <i class="bi bi-exclamation-circle me-2"></i>
            Incorrect username or password. Please try again.
        </div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-person me-1"></i>Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
    </form>

    <div class="divider">or</div>
    <div class="text-center">
        <a href="/" style="color:#6c757d; font-size:0.9rem; text-decoration:none;">
            <i class="bi bi-house me-1"></i>Back to Home
        </a>
    </div>
    <div class="text-center mt-3">
        <span style="color:#6c757d; font-size:0.9rem;">Don't have an account?</span>
        <a href="/api/accounts/register/" style="color:#e94560; font-size:0.9rem; font-weight:500; text-decoration:none; margin-left:4px;">Register</a>
    </div>


    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
