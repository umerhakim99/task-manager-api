<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - MyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .brand span { color: #e94560; }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #dee2e6;
            padding: 0.7rem 1rem;
        }
        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.15);
        }
        .btn-submit {
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 0.7rem;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #c73652; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">My<span>App</span></div>
    <p class="text-center text-muted small mb-4">Enter your new password</p>

    {% if validlink %}
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-500">
                <i class="bi bi-lock me-1"></i>New Password
            </label>
            <input type="password" name="new_password1" class="form-control"
                   placeholder="Enter new password" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-500">
                <i class="bi bi-lock-fill me-1"></i>Confirm Password
            </label>
            <input type="password" name="new_password2" class="form-control"
                   placeholder="Repeat new password" required>
        </div>
        {% if form.errors %}
            <div class="alert alert-danger small">
                {{ form.errors }}
            </div>
        {% endif %}
        <button type="submit" class="btn-submit">
            <i class="bi bi-check-circle me-2"></i>Set New Password
        </button>
    </form>
    {% else %}
        <div class="alert alert-danger text-center">
            This reset link is invalid or has expired. Please request a new one.
        </div>
        <div class="text-center">
            <a href="/accounts/password_reset/" class="btn btn-sm" style="background:#e94560; color:#fff; border-radius:8px;">
                Request New Link
            </a>
        </div>
    {% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
