{% extends 'blog/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="page-title">Delete <span>Contact</span></h1>
        <div class="card">
            <div class="card-header" style="background:#dc3545;">
                <i class="bi bi-exclamation-triangle me-2"></i>Confirm Deletion
            </div>
            <div class="card-body p-4">
                <div class="alert alert-danger d-flex align-items-center mb-4">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span>This action cannot be undone. Are you sure?</span>
                </div>
                <div class="card bg-light mb-4">
                    <div class="card-body">
                        <div class="mb-2">
                            <span class="text-muted small">Name</span>
                            <p class="mb-0 fw-500">{{ contact.name }}</p>
                        </div>
                        <hr>
                        <div class="mb-2">
                            <span class="text-muted small">Email</span>
                            <p class="mb-0">{{ contact.email }}</p>
                        </div>
                        <hr>
                        <div>
                            <span class="text-muted small">Message</span>
                            <p class="mb-0">{{ contact.message }}</p>
                        </div>
                    </div>
                </div>
                <form method="POST" class="d-flex gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash me-2"></i>Yes, Delete
                    </button>
                    <a href="/messages/" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-circle me-2"></i>Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
