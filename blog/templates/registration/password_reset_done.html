<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - MyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
            text-align: center;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
        }
        .brand span { color: #e94560; }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: #d1e7dd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #198754;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">My<span>App</span></div>
    <div class="icon-circle">
        <i class="bi bi-envelope-check"></i>
    </div>
    <h5 style="color:#1a1a2e; font-family:'Playfair Display',serif;">Check Your Email</h5>
    <p class="text-muted small mt-2 mb-4">
        We have sent a password reset link to your email address. Please check your inbox and follow the instructions.
    </p>
    <a href="/accounts/login/" class="btn btn-sm btn-outline-secondary px-4">
        <i class="bi bi-arrow-left me-1"></i>Back to Login
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
